# Include the proxy_cache_path directive in the nginx http {} block, then place
# the location block inside each HTTPS server {} that proxies the Next.js app.

proxy_cache_path /var/cache/nginx/codex_next_image
  levels=1:2
  keys_zone=codex_next_image:32m
  max_size=512m
  inactive=30d
  use_temp_path=off;

location /_next/image {
  # Use codex-con-app-start:3000 in the org server block if that is the
  # upstream serving /shop there.
  proxy_pass http://codex-con-app-shop:3000;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  proxy_cache codex_next_image;
  proxy_cache_key "$scheme$request_method$host$request_uri|$http_accept";
  proxy_cache_valid 200 301 302 30d;
  proxy_cache_valid 404 1m;
  proxy_cache_lock on;
  proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
  proxy_ignore_headers Set-Cookie;
  proxy_hide_header Set-Cookie;

  add_header X-Cache-Status $upstream_cache_status always;
  add_header Cache-Control "public, max-age=31536000, immutable" always;
}
