# Include this file inside the HTTPS server {} block for codexchristi.shop.
#
# This intentionally keeps HTML/ISR pages out of nginx proxy_cache so Next.js
# owns product/category freshness. Nginx only caches immutable assets and
# optimized images.

location ^~ /_next/static/ {
  proxy_pass http://codex-con-app-shop:3000;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  proxy_cache codex_next_assets;
  proxy_cache_key "$scheme$request_method$host$request_uri";
  proxy_cache_valid 200 301 302 30d;
  proxy_cache_valid 404 1m;
  proxy_cache_lock on;
  proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
  proxy_ignore_headers Set-Cookie;
  proxy_hide_header Set-Cookie;

  add_header X-Cache-Status $upstream_cache_status always;
  add_header Cache-Control "public, max-age=31536000, immutable" always;
}

location ^~ /_next/image {
  proxy_pass http://codex-con-app-shop:3000;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  proxy_cache codex_next_assets;
  proxy_cache_key "$scheme$request_method$host$request_uri|$http_accept";
  proxy_cache_valid 200 301 302 30d;
  proxy_cache_valid 404 1m;
  proxy_cache_lock on;
  proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
  proxy_ignore_headers Set-Cookie;
  proxy_hide_header Set-Cookie;

  add_header X-Cache-Status $upstream_cache_status always;
  add_header Cache-Control "public, max-age=31536000, immutable" always;
}

location ^~ /media/ {
  proxy_pass http://codex-con-app-shop:3000;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  proxy_cache codex_next_assets;
  proxy_cache_key "$scheme$request_method$host$request_uri";
  proxy_cache_valid 200 301 302 7d;
  proxy_cache_valid 404 1m;
  proxy_cache_lock on;
  proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
  proxy_ignore_headers Set-Cookie;
  proxy_hide_header Set-Cookie;

  add_header X-Cache-Status $upstream_cache_status always;
}

location = /favicon.ico {
  proxy_pass http://codex-con-app-shop:3000;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  proxy_cache codex_next_assets;
  proxy_cache_key "$scheme$request_method$host$request_uri";
  proxy_cache_valid 200 7d;
  proxy_cache_valid 404 1m;
  proxy_cache_lock on;
  proxy_ignore_headers Set-Cookie;
  proxy_hide_header Set-Cookie;

  add_header X-Cache-Status $upstream_cache_status always;
}

location ~* ^/(opengraph-image|twitter-image)\.(jpg|jpeg|png|webp|avif)$ {
  proxy_pass http://codex-con-app-shop:3000;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  proxy_cache codex_next_assets;
  proxy_cache_key "$scheme$request_method$host$request_uri|$http_accept";
  proxy_cache_valid 200 1h;
  proxy_cache_valid 404 1m;
  proxy_cache_lock on;
  proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
  proxy_ignore_headers Set-Cookie;
  proxy_hide_header Set-Cookie;

  add_header X-Cache-Status $upstream_cache_status always;
}

location / {
  proxy_pass http://codex-con-app-shop:3000;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  proxy_cache off;
  proxy_no_cache 1;
  proxy_cache_bypass 1;

  add_header X-Cache-Status "BYPASS" always;
}
