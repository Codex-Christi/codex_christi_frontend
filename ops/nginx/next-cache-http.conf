# Include this file once inside the nginx http {} block.
#
# HTML must not use this cache. The matching server include only attaches this
# cache zone to immutable Next.js/static asset routes.

proxy_cache_path /var/cache/nginx/codex_next_assets
  levels=1:2
  keys_zone=codex_next_assets:64m
  max_size=1024m
  inactive=30d
  use_temp_path=off;
