services:
  # One build, one runtime container. The app image contains the shop routes too.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    image: codexchristi-next:migrate
    container_name: codex-con-app-migrate
    env_file:
      - .env.production
    environment:
      MERCHIZE_OFFLINE_CATALOG_DATABASE_URL: file:/app/data/db/shop/merchizeCatalog.db
    restart: 'no'
    networks:
      - webserver-network
    volumes:
      - merchize_price_catalog_data:/app/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: codexchristi-next:runtime
    container_name: codex-con-app-start
    env_file:
      - .env.production
    mem_limit: 768m #change_later
    memswap_limit: 1g #change_later
    environment:
      MERCHIZE_OFFLINE_CATALOG_DATABASE_URL: file:/app/data/db/shop/merchizeCatalog.db
      NODE_OPTIONS: --max-old-space-size=512
    depends_on:
      migrate:
        condition: service_completed_successfully
    expose:
      - '3000'
    restart: always
    networks:
      - webserver-network
    volumes:
      - merchize_price_catalog_data:/app/data

volumes:
  merchize_price_catalog_data: {}

networks:
  webserver-network:
    external: true
    name: webserver-network
